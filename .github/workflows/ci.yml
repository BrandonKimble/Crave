name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crave_search_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: yarn prisma generate

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crave_search_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  search-runtime-contract-tests:
    name: search-runtime-contract-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Parse fixture perf report and validate required fields
        env:
          PERF_BASELINE_LOG: scripts/fixtures/perf-shortcut-loop-report.v1.log
        run: |
          scripts/perf-shortcut-loop-report.sh "$PERF_BASELINE_LOG" /tmp/perf-runtime-contract-report.json > /tmp/perf-runtime-contract-report.pretty.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/perf-runtime-contract-report.json','utf8')); if(r.schemaVersion!=='perf-shortcut-report.v1'){ throw new Error('unexpected schemaVersion: '+String(r.schemaVersion)); } if(!r.markerIntegrity?.complete){ throw new Error('markerIntegrity.complete must be true'); } if(typeof r.runCountCompleted!=='number'||r.runCountCompleted<3){ throw new Error('runCountCompleted must be >= 3'); } if(typeof r.runCountExpected!=='number'||r.runCountExpected<3){ throw new Error('runCountExpected must be >= 3'); } if(typeof r.harnessSignatureStable!=='string'||!r.harnessSignatureStable){ throw new Error('harnessSignatureStable is required'); } if(typeof r.environment?.platform!=='string'||!r.environment.platform){ throw new Error('environment.platform is required'); } if(typeof r.environment?.launchTargetMode!=='string'||!r.environment.launchTargetMode){ throw new Error('environment.launchTargetMode is required'); } if(typeof r.environment?.runtimeTarget!=='string'||!r.environment.runtimeTarget){ throw new Error('environment.runtimeTarget is required'); } if(typeof r.environment?.launchPreferDevice!=='number'||!Number.isFinite(r.environment.launchPreferDevice)){ throw new Error('environment.launchPreferDevice is required'); } for (const key of ['floorMean','stallP95','stallMaxMean','uiFloorMean','uiStallP95','uiStallMaxMean']) { if (typeof r[key] !== 'number' || !Number.isFinite(r[key])) { throw new Error('missing numeric field: ' + key); } }"

      - name: Comparator passes for fixture self-compare
        run: |
          scripts/ci-compare-perf-reports.sh /tmp/perf-runtime-contract-report.json /tmp/perf-runtime-contract-report.json > /tmp/perf-runtime-compare-pass.json

      - name: Parser ignores stale-session windows outside run bounds
        run: |
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('/tmp/perf-runtime-contract-report.json','utf8')); const lines=fs.readFileSync('scripts/fixtures/perf-shortcut-loop-report.v1.log','utf8').trimEnd().split(/\r?\n/); const run1=report.runMetrics.find((entry)=>entry.runNumber===1); const run2=report.runMetrics.find((entry)=>entry.runNumber===2); if(!run1||typeof run1.endMs!=='number'){ throw new Error('run1 endMs missing in fixture report'); } const nextStart=run2&&typeof run2.startMs==='number'?run2.startMs:run1.endMs+1000; const staleNow=Math.min(run1.endMs+50, nextStart-1); const staleWindow={event:'window',nowMs:staleNow,windowMs:133.3,frameCount:1,avgFrameMs:9999,avgFps:0.1,floorFps:0.1,p95FrameMs:9999,p95Fps:0.1,maxFrameMs:9999,stallCount:1,stallLongestMs:9999,droppedFrameEstimate:999,droppedFrameRatio:1,harnessRunId:report.harnessRunId,shortcutSessionId:1,shortcutStage:'results_list_ramp'}; lines.push(' LOG  [SearchPerf][JsFrameSampler] '+JSON.stringify(staleWindow)); fs.writeFileSync('/tmp/perf-runtime-contract-report.stale.log', lines.join('\n')+'\n');"
          scripts/perf-shortcut-loop-report.sh /tmp/perf-runtime-contract-report.stale.log /tmp/perf-runtime-contract-report.stale.json > /tmp/perf-runtime-contract-report.stale.pretty.json
          node -e "const fs=require('fs'); const base=JSON.parse(fs.readFileSync('/tmp/perf-runtime-contract-report.json','utf8')); const stale=JSON.parse(fs.readFileSync('/tmp/perf-runtime-contract-report.stale.json','utf8')); const fields=['floorMean','stallP95','stallMaxMean','uiFloorMean','uiStallP95','uiStallMaxMean']; for (const field of fields) { if (base[field] !== stale[field]) { throw new Error('stale-session window changed metric '+field+' base='+String(base[field])+' stale='+String(stale[field])); } } const baseRun1=base.runMetrics.find((entry)=>entry.runNumber===1); const staleRun1=stale.runMetrics.find((entry)=>entry.runNumber===1); if(!baseRun1||!staleRun1){ throw new Error('run1 metrics missing'); } if(baseRun1.stallLongestMax!==staleRun1.stallLongestMax){ throw new Error('stale-session window changed run1 stallLongestMax'); }"

      - name: Comparator fails catastrophic candidate (absolute gate)
        run: |
          node -e "const fs=require('fs'); const baseline=JSON.parse(fs.readFileSync('/tmp/perf-runtime-contract-report.json','utf8')); const candidate=JSON.parse(JSON.stringify(baseline)); candidate.catastrophic={...(candidate.catastrophic||{}),runNumbers:[1,2],runCount:2}; fs.writeFileSync('/tmp/perf-runtime-contract-report.fail-cat.json', JSON.stringify(candidate,null,2));"
          if scripts/ci-compare-perf-reports.sh /tmp/perf-runtime-contract-report.json /tmp/perf-runtime-contract-report.fail-cat.json > /tmp/perf-runtime-compare-fail.json; then
            echo "expected comparator to fail catastrophic gate" >&2
            exit 1
          fi

  no-bypass-search-runtime:
    name: no-bypass-search-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Enforce no-bypass fail-on-growth guard
        run: scripts/no-bypass-search-runtime.sh
