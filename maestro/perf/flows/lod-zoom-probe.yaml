appId: com.brandonkimble.cravesearch
# LOD + wiggle attribution: chip-tap search, then zoom IN (promote) and OUT
# (demote) twice. Capture step.roleP (does promotion track zoom?), frame.zoom
# (did the camera move?), mut.bundle removes during moving (the wiggle cause).
---
- tapOn: { text: 'Close restaurant', optional: true }
- tapOn: { text: 'Close results', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 45000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=12.6&label=lodprobe_seed'
- waitForAnimationToEnd: { timeout: 1600 }
- tapOn: { point: '25%, 17%' }
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3000 }
- openLink: 'crave://perf-scenario-mark?phase=ZOOM_CYCLES_START&label=lodprobe'
- repeat:
    times: 2
    commands:
      - openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=40.7550&lng=-73.9800&zoom=15.0&cameraDurationMs=900&label=ZOOM_IN'
      - waitForAnimationToEnd: { timeout: 2000 }
      - openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=40.7550&lng=-73.9800&zoom=11.5&cameraDurationMs=900&label=ZOOM_OUT'
      - waitForAnimationToEnd: { timeout: 2000 }
- openLink: 'crave://perf-scenario-mark?phase=ZOOM_CYCLES_END&label=lodprobe'
- waitForAnimationToEnd: { timeout: 1000 }
