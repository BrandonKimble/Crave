appId: com.brandonkimble.cravesearch
# map-accept acceptance drive (search-map-ideal-effort roadmap Step 1): durable promotion of the
# throwaway rework-validate.yaml + toggle-back-staleness.yaml drives. Sequence: fresh search reveal
# -> toggle to dishes -> toggle back (the T4 staleness axis) -> rapid 8-tap toggle burst -> settle.
# The dismiss leg lives in map-accept-dismiss.yaml on purpose: maestro/perf/map-accept.sh marks the
# pre-dismiss boundary between the two legs so its final-state assertions never read the legitimate
# post-dismiss `[t4dbg] count: 0` frames. Assertions are trace-based (Metro + os_log probes), not
# screenshot-based — see maestro/perf/map-accept.sh.
---
# Reset to home (whatever sheet is up), then wait for the search bar.
- tapOn: { text: 'Close restaurant', optional: true }
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 30000 }
# Deterministic camera seed over the Manhattan test market.
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.2&label=map-accept-seed'
- waitForAnimationToEnd: { timeout: 1500 }
# Fresh search reveal: coordinate-tap the 'Best restaurants' shortcut chip (INTEGER percents only —
# fractional percents throw in Maestro). The chip tap is the reliable reveal lever; the
# submit_shortcut_restaurants deep link can land on a poll CTA depending on UI state.
- tapOn: { point: '25%, 17%' }
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3500 }
# Toggle to dishes ('tapOn: id' is the reliable lever on this sheet; text/coordinate taps misfire).
- tapOn: { id: 'search-segment-toggle' }
- waitForAnimationToEnd: { timeout: 4000 }
# Toggle back to restaurants — the T4 toggle-back staleness axis.
- tapOn: { id: 'search-segment-toggle' }
- waitForAnimationToEnd: { timeout: 4000 }
# Rapid 8-tap burst, no waits between taps on purpose (even count -> settles on restaurants).
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
- tapOn: { id: 'search-segment-toggle' }
# Let the burst settle (debounced toggle settle + coverage restore/re-fetch + catalog publish).
- waitForAnimationToEnd: { timeout: 6000 }
