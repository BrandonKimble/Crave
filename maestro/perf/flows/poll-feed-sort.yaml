appId: com.brandonkimble.cravesearch
---
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 60000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera_and_resolve_market&lat=40.7550&lng=-73.9800&zoom=13.2'
- waitForAnimationToEnd: { timeout: 2500 }
- tapOn: 'Polls in New York'
- waitForAnimationToEnd: { timeout: 2500 }
- takeScreenshot: /tmp/crave-sort-default
- tapOn: { id: 'poll-feed-sort-top' }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/crave-sort-top
- tapOn: { id: 'poll-feed-sort-trending' }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/crave-sort-trending
- tapOn: { id: 'poll-feed-sort-trending' }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/crave-sort-cleared
