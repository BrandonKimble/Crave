appId: com.brandonkimble.cravesearch
---
- tapOn: { text: 'Close restaurant', optional: true }
- tapOn: { text: 'Close results', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 60000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.2'
- waitForAnimationToEnd: { timeout: 2500 }
- tapOn: 'Polls in New York'
- waitForAnimationToEnd: { timeout: 2500 }
- tapOn: { id: 'poll-card-title-.*' }
- waitForAnimationToEnd: { timeout: 8000 }
- takeScreenshot: /tmp/titletap
