appId: com.brandonkimble.cravesearch
---
- tapOn:
    text: 'Search'
    optional: true
- tapOn:
    text: 'Close restaurant'
    optional: true
- tapOn:
    text: 'Close results'
    optional: true
- tapOn:
    text: 'Close polls'
    optional: true
- extendedWaitUntil:
    visible: 'What are you craving?'
    timeout: 15000
- extendedWaitUntil:
    visible: 'Show best restaurants here'
    timeout: 15000
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=30.2672&lng=-97.7431&zoom=11.5&label=austin'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: '25%, 19%'
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-profile-close-results-open
- tapOn:
    point: '52%, 30%'
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible: 'Close restaurant'
    timeout: 12000
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-profile-close-profile-open
- tapOn:
    text: 'Close restaurant'
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 12000
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-profile-close-back-to-results
