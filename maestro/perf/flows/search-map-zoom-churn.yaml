appId: com.brandonkimble.cravesearch
# Faithful repro of the manual single-region pinch-zoom in/out cycles the user
# described for the flash/crossfade bugs: rapid back-and-forth zoom on a fixed
# center (no pan) to stress single-marker promote<->demote churn. Read the
# flashReversalCount / crossfadeGapCount detectors + the "LOD crossfade clean"
# gate after.
---
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 45000 }
- extendedWaitUntil: { visible: 'Show best restaurants here', timeout: 45000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=30.2672&lng=-97.7431&zoom=12.0&label=churn_seed'
- waitForAnimationToEnd: { timeout: 1600 }
- openLink: 'crave://perf-scenario-command?action=submit_shortcut_restaurants'
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 1500 }
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_start&label=zoom_churn'
- repeat:
    times: 6
    commands:
      - openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=30.2672&lng=-97.7431&zoom=13.6&cameraDurationMs=420&label=churn_in'
      - waitForAnimationToEnd: { timeout: 520 }
      - openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=30.2672&lng=-97.7431&zoom=11.6&cameraDurationMs=420&label=churn_out'
      - waitForAnimationToEnd: { timeout: 520 }
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_end&label=zoom_churn'
- waitForAnimationToEnd: { timeout: 1200 }
