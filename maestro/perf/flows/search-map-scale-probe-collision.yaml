appId: com.brandonkimble.cravesearch
# perf-scenario-sim-location: 40.7550,-73.9800
---
# COLLISION-CULLING CAPACITY PROBE (#21, follow-up)
#
# Answers: with allowOverlap:false (collision ON), how many TOTAL pins can we load
# when most are draw-culled at any view? This is the "load the world's results, show
# only the non-colliding subset, more appear as you zoom in" approach.
#
# All synthetic pins sit in one ~metro-sized scatter and are viewed whole, so every
# pin is in the loaded tiles and participates in collision (worst case — isolates
# collision CPU from tile culling). Pin-only (no shadow) in collide mode. Stepped
# 10k -> 100k because draw-culling makes draw cheap, so the limit is collision/upload.
- tapOn:
    text: 'Search'
    optional: true
- tapOn:
    text: 'Close results'
    optional: true
- tapOn:
    text: 'Close polls'
    optional: true
- extendedWaitUntil:
    visible: 'What are you craving?'
    timeout: 45000
- extendedWaitUntil:
    visible: 'Show best restaurants here'
    timeout: 45000
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=11.6&label=collide_seed'
- waitForAnimationToEnd:
    timeout: 1600
- openLink: 'crave://perf-scenario-command?action=submit_shortcut_restaurants'
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1200
- openLink: 'crave://perf-scenario-mark?phase=scale_probe_run&label=collision_probe_start'

# === baseline 0 ===
- openLink: 'crave://perf-scenario-command?action=set_scale_probe_markers&markerCount=0&collide=1&lat=40.7550&lng=-73.9800&label=collide_0'
- waitForAnimationToEnd:
    timeout: 700
- openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=40.7550&lng=-73.9607&zoom=11.6&cameraDurationMs=650&label=c0_pan_east'
- waitForAnimationToEnd:
    timeout: 850
- openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=40.7550&lng=-73.9800&zoom=13.0&cameraDurationMs=700&label=c0_zoom_in'
- waitForAnimationToEnd:
    timeout: 950
- openLink: 'crave://perf-scenario-command?action=animate_map_camera&lat=40.7550&lng=-73.9800&zoom=11.6&cameraDurationMs=700&label=c0_zoom_out'
- waitForAnimationToEnd:
    timeout: 950

