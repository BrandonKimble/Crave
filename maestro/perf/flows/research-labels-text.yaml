appId: com.brandonkimble.cravesearch
---
# Reliable text-input search + dismiss + re-search to verify labels rebuild after
# re-search (natural search uses the same publishSources label path as shortcut).
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 30000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.4&label=seed'
- waitForAnimationToEnd: { timeout: 1500 }
- openLink: 'crave://perf-scenario-mark?phase=first_begin&label=research_labels_text'
- tapOn: { text: 'What are you craving?' }
- inputText: 'best tacos'
- pressKey: Enter
- extendedWaitUntil: { visible: 'Close results', timeout: 25000 }
- waitForAnimationToEnd: { timeout: 4500 }
- openLink: 'crave://perf-scenario-mark?phase=first_loaded&label=research_labels_text'
- waitForAnimationToEnd: { timeout: 2000 }
- tapOn: { text: 'Close results' }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3000 }
- openLink: 'crave://perf-scenario-mark?phase=research_begin&label=research_labels_text'
- tapOn: { text: 'What are you craving?' }
- inputText: 'best pizza'
- pressKey: Enter
- extendedWaitUntil: { visible: 'Close results', timeout: 25000 }
- waitForAnimationToEnd: { timeout: 5000 }
- openLink: 'crave://perf-scenario-mark?phase=research_loaded&label=research_labels_text'
