appId: com.brandonkimble.cravesearch
---
# Verification flow: submit Best Restaurants and screenshot the settled map.
# Startup location is controlled by EXPO_PUBLIC_STARTUP_* (set by perf-scenario-ios.sh),
# so the map already centers on the test market — no set_map_camera needed.
- tapOn: { text: 'Search', optional: true }
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil:
    visible: 'What are you craving?'
    timeout: 45000
- extendedWaitUntil:
    visible: 'Show best restaurants here'
    timeout: 45000
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/startup-origin
- openLink: 'crave://perf-scenario-command?action=submit_shortcut_restaurants'
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 20000
- waitForAnimationToEnd: { timeout: 2500 }
- takeScreenshot: /tmp/startup-pins
