appId: com.brandonkimble.cravesearch
---
# Aggressive pan storm: large multi-direction finger swipes repeated many times
# to reproduce "pins go invisible after a lot of panning" (#11) and dot-under-pin
# (#13). Big swipes cross the viewport edge fast → markers rapid-flip promote/demote.
- tapOn: { text: 'Close restaurant', optional: true }
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 45000 }
- extendedWaitUntil: { visible: 'Show best restaurants here', timeout: 45000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.4&label=seed'
- waitForAnimationToEnd: { timeout: 1600 }
- openLink: 'crave://perf-scenario-command?action=submit_shortcut_restaurants'
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3500 }
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_start&label=lod_pan_storm'
- repeat:
    times: 6
    commands:
      - swipe:
          start: 30%, 35%
          end: 70%, 30%
          duration: 500
      - swipe:
          start: 70%, 30%
          end: 30%, 38%
          duration: 500
      - swipe:
          start: 50%, 45%
          end: 52%, 20%
          duration: 450
      - swipe:
          start: 52%, 20%
          end: 48%, 45%
          duration: 450
      - swipe:
          start: 35%, 25%
          end: 65%, 40%
          duration: 500
      - swipe:
          start: 65%, 40%
          end: 35%, 22%
          duration: 500
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_end&label=lod_pan_storm'
- waitForAnimationToEnd: { timeout: 4000 }
