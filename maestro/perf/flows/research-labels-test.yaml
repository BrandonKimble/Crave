appId: com.brandonkimble.cravesearch
---
# Real chip-tap search + dismiss + re-search to verify labels rebuild after re-search.
# Uses real taps (deep-link submit_shortcut is flaky). Marks phases so the harness
# window can be sliced.
- tapOn: { text: 'Close results', optional: true }
- tapOn: { text: 'Close polls', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 30000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.4&label=seed'
- waitForAnimationToEnd: { timeout: 1500 }
- openLink: 'crave://perf-scenario-mark?phase=first_search_begin&label=research_labels'
- tapOn: { text: 'Best restaurants' }
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 4000 }
- openLink: 'crave://perf-scenario-mark?phase=first_search_loaded&label=research_labels'
- waitForAnimationToEnd: { timeout: 2000 }
- tapOn: { text: 'Close results' }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3000 }
- openLink: 'crave://perf-scenario-mark?phase=research_begin&label=research_labels'
- tapOn: { text: 'Best restaurants' }
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 5000 }
- openLink: 'crave://perf-scenario-mark?phase=research_loaded&label=research_labels'
