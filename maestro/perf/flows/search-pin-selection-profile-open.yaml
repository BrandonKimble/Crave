appId: com.brandonkimble.cravesearch
---
- tapOn:
    text: 'Search'
    optional: true
- tapOn:
    text: 'Close restaurant'
    optional: true
- tapOn:
    text: 'Close results'
    optional: true
- tapOn:
    text: 'Close polls'
    optional: true
- extendedWaitUntil:
    visible: 'What are you craving?'
    timeout: 45000
- extendedWaitUntil:
    visible: 'Show best restaurants here'
    timeout: 45000
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=30.2672&lng=-97.7431&zoom=11.5&label=austin'
- waitForAnimationToEnd:
    timeout: 2000
- openLink: 'crave://perf-scenario-command?action=submit_shortcut_restaurants'
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-pin-selection-results-open
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_start&label=pin_selection_profile_open'
- tapOn:
    point: '53%, 34%'
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible: 'Close restaurant'
    timeout: 12000
- waitForAnimationToEnd:
    timeout: 1000
- openLink: 'crave://perf-scenario-mark?phase=measured_repeat_loop_end&label=pin_selection_profile_open'
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-pin-selection-profile-open
