appId: com.brandonkimble.cravesearch
# Pagination attribution (ledger #6): scroll to bottom, back off, return — re-arms
# FlashList's onEndReached after any spurious reveal-time firing.
---
- repeat:
    times: 6
    commands:
      - swipe:
          start: '50%, 80%'
          end: '50%, 25%'
          duration: 400
      - waitForAnimationToEnd:
          timeout: 600
- swipe:
    start: '50%, 30%'
    end: '50%, 75%'
    duration: 400
- waitForAnimationToEnd:
    timeout: 600
- repeat:
    times: 3
    commands:
      - swipe:
          start: '50%, 80%'
          end: '50%, 25%'
          duration: 400
      - waitForAnimationToEnd:
          timeout: 600
