appId: com.brandonkimble.cravesearch
# TEMP capture flow: clean submit via the real "Best restaurants" chip tap (by
# coordinate, like search-submit-visual-parity) at a dense NYC spot + zoom where
# pins+labels promote, hold settled so we can read label harness + screenshot.
---
- tapOn: { text: 'Close restaurant', optional: true }
- tapOn: { text: 'Close results', optional: true }
- extendedWaitUntil: { visible: 'What are you craving?', timeout: 45000 }
- openLink: 'crave://perf-scenario-command?action=set_map_camera&lat=40.7550&lng=-73.9800&zoom=13.2&label=labels_seed'
- waitForAnimationToEnd: { timeout: 1600 }
- tapOn: { point: '25%, 17%' }
- extendedWaitUntil: { visible: 'Close results', timeout: 20000 }
- waitForAnimationToEnd: { timeout: 3500 }
- takeScreenshot: /tmp/labels-enter
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/labels-settled
