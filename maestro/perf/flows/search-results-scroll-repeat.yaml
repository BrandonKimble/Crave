appId: com.brandonkimble.cravesearch
---
- tapOn:
    text: 'Search'
    optional: true
- tapOn:
    text: 'Close polls'
    optional: true
- tapOn:
    text: 'Close results'
    optional: true
- tapOn:
    point: "25%, 19%"
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible: 'Close results'
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1000
- openLink: crave://perf-scenario-mark?phase=measured_repeat_loop_start
- repeat:
    times: 6
    commands:
      - swipe:
          start: "50%, 78%"
          end: "50%, 36%"
          duration: 520
      - swipe:
          start: "50%, 36%"
          end: "50%, 78%"
          duration: 520
- openLink: crave://perf-scenario-mark?phase=measured_repeat_loop_end
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: search-visual-results-open-settled
